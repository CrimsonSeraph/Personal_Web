baseURL = 'https://personal-web.crimsonseraph.top/'
languageCode = 'zh-CN'
title = 'CrimsonSeraph'
defaultContentLanguage = 'zh-CN'

[languages]
  [languages.zh-CN]
    languageName = '简体中文'
    weight = 1
    hasCJKLanguage = true
  [languages.en]
    languageName = 'English'
    weight = 2

[markup.highlight]
  guessSyntax = true
  noClasses = false

[markup.goldmark.extensions.passthrough]
  enable = true
  delimiters.block = [["\\[", "\\]"], ["$$", "$$"]]
  delimiters.inline = [["\\(", "\\)"], ["$", "$"]]

[outputs]
  home = ["Algolia", "HTML", "RSS"]
  section = ["HTML", "RSS"]
  [outputFormats.Algolia]
  baseName = "algolia"
  isPlainText = true
  mediaType = "application/json"
  notAlternative = true