########################################
# Basic Configuration
########################################

# main menu navigation
# for more icon information, please visit https://github.com/D-Sketon/hexo-theme-reimu/issues/30
menu:
  - name: home
    url: ""
    icon: f015 # default use taichi icon, you can use a hexadecimal representation of fontawesome or icon_font, like 'f0c1'
  - name: archives
    url: "archives"
    icon: f187
  - name: about
    url: "about"
    icon: f007
  - name: friend
    url: "friend"
    icon: f0c0

mainSections: ["post"]
# т╣┤№╝їТюѕ№╝їТЌЦтЈіТЌХжЌ┤уџёТа╝т╝ЈтїќТаит╝Ј
# Format style for year,month,date & time
yearFormat: "2006"
monthFormat: "2006-01"
dateFormat: "2006-01-02"
timeFormat: "2006-01-02 15:04:05"

author: CrimsonSeraph
email: LTYY.LeoYu@gmail.com
description: "РюЪтЇЄтцЕРюЪ"
# subtitle: "т░ЉтЦ│уЦѕуЦиСИГ..."
subtitle: 
  typing:
    enable: false
    strings:
      # - Sentence 1
      # - Sentence 2
      # - Sentence 3
      # - Sentence 4
    typeSpeed: 100              # ТЅЊтГЌжђЪт║д№╝ѕТ»ФуДњ/тГЌугд№╝Ѕ 
    backSpeed: 50               # тѕажЎцжђЪт║д№╝ѕТ»ФуДњ/тГЌугд№╝Ѕ
    backDelay: 2000             # ТЅЊт«їСИђтЈЦУ»Ютљј№╝їуГЅтЙЁТЌХжЌ┤
    startDelay: 300             # жАхжЮбтіаУййтљј№╝їуГЅтЙЁТЌХжЌ┤
    loop: true                  # Тў»тљдтЙфуј»ТњГТћЙ
    shuffle: true               # Тў»тљджџЈТю║УЙЊтЄ║тЈЦтГљ
    showCursor: true            # Тў»тљдТўЙуц║жЌфуЃЂуџётГЌугд
    cursorChar: "|"             # тГЌугд
    smartBackspace: false       # ТЎ║УЃйжђђТа╝№╝їтЈфтѕажЎцСИЇтљїуџёжЃетѕє
  text: "РюЪтЇЄтцЕРюЪ"                # тйЊ typing.enable = false ТЌХСй┐уће

banner: "images/banner.webp"
# You can also write it in the form of the following url
# banner: "https://example.com"

# If you want to use the srcset attribute, please enable it
banner_srcset:
  enable: false
  srcset:
    - src: "images/banner-600w.webp"
      media: "(max-width: 479px)"
    - src: "images/banner-800w.webp"
      media: "(max-width: 799px)"
    - src: "images/banner.webp"
      media: "(min-width: 800px)"

avatar: "avatar.webp"

# Control the display of the post cover
# If not set, the banner image will be displayed by default
# Its priority is lower than the cover in the Front-matter
cover: # https://example.com / false / rgb(255,117,117)

# Control the display of the post toc
# Its priority is lower than the toc in the Front-matter
toc: true

# Open Graph
open_graph:
  enable: true
  options:
    #twitter_card: <twitter:card>
    #twitter_id: <twitter:creator>
    #twitter_site: <twitter:site>
    #twitter_image: <twitter:image>
    #google_plus: <g+:profile_link>
    #fb_admins: <fb:admin_id>
    #fb_app_id: <fb:app_id>

# Content
excerpt_link: Read More

# Footer copyright
# Inject code snippet right in the footer copyright
# Make sure your code snippet is safeHTML
copyright: |-
  <div style="display:flex; flex-direction:column; align-items:center;">
    <a rel="license" href="https://creativecommons.org/licenses/by-nc/4.0/">
      <img alt="Creative Commons License" style="border-width:0" src="https://i.creativecommons.org/l/by-nc/4.0/88x31.png" />
    </a>
    <span>This work is licensed under a 
      <a rel="license" href="https://creativecommons.org/licenses/by-nc/4.0/">Creative Commons Attribution-NonCommercial 4.0 International License</a>.
    </span>
  </div>
# Need help choosing? Please see...
# https://creativecommons.org/choose/
# https://choosealicense.com/
# copyright: |-
#   <div style="flex-direction:column;align-items: center;"><a rel="license" href="http://creativecommons.org/licenses/by/4.0/"><img alt="Creative Commons License" style="border-width:0" src="https://i.creativecommons.org/l/by/4.0/88x31.png" /></a>
#   All website licensed under <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">CC BY 4.0</a></div>

footer:
  since: 2026 # 2020-current year
  powered: true
  count: true
  busuanzi: true
  icon:
    url: "../favicon.ico" # this path is relative to the css/main.css, so it needs to go up one level to reach the images folder
    rotate: false
    mask: true # whether to use the images as a mask

# Sidebar
# sidebar: right # deprecated, use sidebar.position instead
sidebar:
  position: left
  menu: true  # whether to show the sidebar menu button, ignored on mobile devices
  article:
    show_common: true # whether to show common sidebar, ignored on mobile devices

social:
  email: LTYY.LeoYu@gmail.com
  github: https://github.com/CrimsonSeraph
  # google: https://plus.google.com/yourname
  twitter: https://x.com/CrimSeraph_QwQ
  # facebook: https://www.facebook.com/yourname
  # instagram: https://www.instagram.com/yourname
  # linkedin: https://www.linkedin.com/in/yourname
  # pinterest: https://www.pinterest.com/yourname
  # youtube: https://www.youtube.com/channel/yourname
  # vimeo: https://vimeo.com/yourname
  # flickr: https://www.flickr.com/photos/yourname
  # dribbble: https://dribbble.com/yourname
  # behance: https://www.behance.net/yourname
  bilibili: https://space.bilibili.com/1741002917?spm_id_from=333.1007.0.0
  # weibo: https://weibo.com/yourname
  # zhihu: https://www.zhihu.com/people/yourname
  # reddit: https://www.reddit.com/user/yourname
  # tumblr: https://yourname.tumblr.com
  # medium: https://medium.com/@yourname
  # deviantart: https://yourname.deviantart.com
  # stackoverflow: https://stackoverflow.com/users/yourname
  # keybase: https://keybase.io/yourname
  # telegram: https://t.me/yourname
  # discord: https://discordapp.com/users/yourname
  steam: https://steamcommunity.com/id/CrimsonSeraph/

widgets:
  - category
  - tag
  - tagcloud
  - recent_posts

# Widget behavior
category_limits: 10
tag_limits: 10
recent_posts_limits: 5
tagcloud_limits: 20

# Archive behavior
only_show_capsule_in_index: false # If you have hugo amounts of tags and categories, you can set this to true to only show the capsule in the index page for better performance
uppercase_capsule: true # If you want to keep taxonomic capsule unchanged, please set this to false

show_update_time: false # If you want to show the update time, please set this to true

# Summary content
summary:
  enable: false
  style: 'subtitle' # 'subtitle' or 'blockquote'

# RSS output
rss:
  limit: 10             # The number of recent articles to be output, write -1 to output all
  showFullContent: false # output full content or description
  showCopyright: true   # If true, add copyright to the end of article.

# Sort order configuration
# Available values: default, date, date-reverse, weight, weight-reverse
# default: hugo's default sort order for page collections, see https://gohugo.io/quick-reference/page-collections/#sort
# date: sorted by date in ascending order (oldest first)
# date-reverse: sorted by date in descending order (newest first)
# weight: sorted by weight in ascending order
# weight-reverse: sorted by weight in descending order
sort_order:
  taxonomy:
    category: date-reverse # controlled by categories_weight
    tag: date-reverse # controlled by tags_weight
  archive: date-reverse # controlled by weight
  home: default # controlled by weight

# Pagination
paginate:
  archive: # Number of posts per page in archive and taxonomy pages
  post: # Number of posts per page in home and other list pages

########################################
# CSS
########################################

layout:
  max_width: 1350px # the max width of the main content area

triangle_badge:
  enable: true
  icon: github # same as the icon in the social config
  link: https://github.com/CrimsonSeraph

anchor_icon: f08b # default use '#' icon, you can use a hexadecimal representation of fontawesome or icon_font, like 'f0c1', you can also use false to hide anchor icon

reimu_cursor:
  enable: true
  cursor:
    default: ../images/cursor/miku-cursor-normal.png  # this path is relative to the css/main.css, so it needs to go up one level to reach the images folder
    pointer: ../images/cursor/miku-cursor-pointer.png
    text: ../images/cursor/miku-cursor-text.png

icon_font: false

# Font loading strategy
# Custom Font -> Google Fonts -> Local FallBack Font

# Custom Font
custom_font:
  enable: false
  article:
    # - css: https://fontsapi.zeoseven.com/292/main/result.css # font css
    #   name: LXGW WenKai # font name
  code:

# https://fonts.google.com/
# Google Fonts, higher priority than local_font
font:
  enable: true
  article:
    - Mulish
    - Noto Serif SC
  code:
    # - Ubuntu Mono
    # - Source Code Pro
    # - JetBrains Mono

# Local FallBack Font
local_font:
  article:
    - "-apple-system"
    - PingFang SC
    - Microsoft YaHei
    - sans-serif
  code:
    - Menlo
    - Monaco
    - Consolas
    - monospace

dark_mode:
  # true means that the dark mode is enabled by default
  # false means that the dark mode is disabled by default
  # auto means that the dark mode is automatically switched according to the system settings
  enable: auto # true | false | auto

########################################
# Analytics
########################################

baidu_analytics: false
google_analytics: false
clarity: false

########################################
# Markdown Display
########################################

# mermaid url https://github.com/mermaid-js/mermaid
mermaid:
  zoom: true # whether to enable zoom for mermaid diagrams

code_block:
  # whether to expand the code block by default
  # true means expand all code blocks by default
  # false means collapse all code blocks by default
  # number means collapse the code block by default when the number of lines exceeds the specified value
  expand: true

# Clipboard configuration
clipboard:
  success: 
    en: Copy successfully (*^Рќй^*)
    zh-CN: тцЇтѕХТѕљтіЪ (*^Рќй^*)
    zh-TW: УцЄУБйТѕљтіЪ (*^Рќй^*)
    ja: сѓ│сЃћсЃ╝ТѕљтіЪ (*^Рќй^*)
    pt-BR: Copiado com sucesso (*^Рќй^*)
  fail: 
    en: Copy failed (№ЙЪРі┐№ЙЪ)№Йѓ
    zh-CN: тцЇтѕХтц▒У┤Ц (№ЙЪРі┐№ЙЪ)№Йѓ
    zh-TW: УцЄУБйтц▒ТЋЌ (№ЙЪРі┐№ЙЪ)№Йѓ
    ja: сѓ│сЃћсЃ╝тц▒ТЋЌ (№ЙЪРі┐№ЙЪ)№Йѓ
    pt-BR: Falha ao copiar (№ЙЪРі┐№ЙЪ)№Йѓ
  copyright:
    enable: false
    count: 50 # The number of characters when the copyright is displayed
    license_type: by-nc-sa # https://creativecommons.org/licenses

math:
  katex:
    enable: false
  mathjax:
    enable: true
    options: # see https://docs.mathjax.org/en/latest/web/configuration.html
    # we need to put the configuration in an array, because hugo will automatically convert the key to lowercase
      [
        {
          tex:
            {
              tags: "ams",
              useLabelIds: true,
              inlineMath: [["$", "$"], ['\\(', '\\)']],
              displayMath: [["$$", "$$"], ['\\[', '\\]']],
              processEscapes: true,
              processEnvironments: true,
              autoload: { color: [], colorv2: ["color"] },
              packages: { "[+]": ["noerrors"] },
            },
          options:
            {
              skipHtmlTags:
                ["script", "noscript", "style", "textarea", "pre", "code"],
              ignoreHtmlClass: "tex2jax_ignore",
              processHtmlClass: "tex2jax_process",
            },
          loader: { load: ["input/asciimath", "[tex]/noerrors"] },
        },
      ]

########################################
# Comment system
########################################

# global control of the comment system
# you can use multiple comment systems at the same time
# load order: localStorage(user manually selects) -> default
# -> valine -> waline -> twikoo -> gitalk -> giscus -> disqus
comment:
  # comment system title
  title:
    en: Leave a comment
    zh-CN: У»┤С║ЏС╗ђС╣ѕтљД№╝Ђ
    zh-TW: УффС║ЏС╗ђж║╝тљД№╝Ђ
    ja: сѓ│сЃАсЃ│сЃѕсѓњТ«ІсЂЎ
    pt-BR: Deixe um coment├Аrio
  default: waline # default comment system, when you enable multiple comment systems

# valine comment system. https://valine.js.org
# version 1.5.1
# notify and verify have been deprecated
valine:
  enable: false # if you want to use valine,please set this value is true
  appId: # leancloud application app id
  appKey: # leancloud application app key
  pageSize: 10 # comment list page size
  avatar: mp # gravatar style https://valine.js.org/#/avatar
  # lang: zh-cn # deprecated, use html.lang instead
  placeholder: Just go go # valine comment input placeholder(like: Please leave your footprints )
  guest_info: nick,mail,link #valine comment header info
  recordIP: true # whether to record the IP address of the commenters
  highlight: true # whether to highlight the code blocks
  visitor: false # whether to display the number of visitors
  serverURLs: # leancloud server url

# https://waline.js.org/
waline:
  enable: true
  serverURL: https://comment.crimsonseraph.top/
  # lang: zh-CN # deprecated, use html.lang instead
  locale: {} # https://waline.js.org/guide/features/i18n.html#%E8%87%AA%E5%AE%9A%E4%B9%89%E8%AF%AD%E8%A8%80
  emoji:
    - https://unpkg.com/@waline/emojis@1.2.0/weibo
    - https://unpkg.com/@waline/emojis@1.2.0/alus
    - https://unpkg.com/@waline/emojis@1.2.0/bilibili
    - https://unpkg.com/@waline/emojis@1.2.0/qq
    - https://unpkg.com/@waline/emojis@1.2.0/tieba
    - https://unpkg.com/@waline/emojis@1.2.0/tw-emoji
  meta:
    - nick
    - mail
    - link
  requiredMeta:
    - nick
    - mail
  wordLimit: 0
  pageSize: 10
  pageview: true

# https://twikoo.js.org
twikoo:
  enable: false
  envId: # УЁЙУ«»С║Љуј»тбЃтАФ envId№╝ЏVercel уј»тбЃтАФтю░тЮђ№╝ѕhttps://xxx.vercel.app№╝Ѕ
  region:

# https://github.com/gitalk/gitalk/blob/master/readme-cn.md
gitalk:
  enable: false
  clientID:
  clientSecret:
  repo:
  owner:
  admin:
  md5: false

# https://giscus.app/zh-CN
giscus:
  enable: false
  repo:
  repoId:
  category:
  categoryId:
  mapping: mapping
  strict: 0
  reactionsEnabled: 1
  emitMetadata: 0
  inputPosition: bottom
  # commentTheme: preferred_color_scheme invalid
  # lang: zh-CN # deprecated, use html.lang instead

# https://disqus.com
disqus:
  enable: false
  shortname: # your disqus shortname
  count: true

# https://utteranc.es
utterances:
  enable: false
  repo: owner/repo # Change this to "Your GitHub Username/The Repository Name" used for storing blog comments
  issue_term: title
  theme: auto # auto means to automatically adapt to dark and light themes, you can also use specific themes like github-light, github-dark, preferred-color-scheme, etc.

########################################
# Search
########################################

algolia_search:
  enable: true
  appID: 1YYCGI2ZZ9
