name: Update Algolia Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Upload to Algolia
        env:
          ALGOLIA_APP_ID: ${{ secrets.APPLICATION_ID }}
          ALGOLIA_API_KEY: ${{ secrets.API_KEY }}
          ALGOLIA_INDEX_NAME: personal-web
        run: |
          # 使用 Node.js 脚本上传（推荐）
          npm install algoliasearch@4
          node .github/scripts/upload-algolia.js

      - name: List generated files
        run: ls -la public/